<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>Save Our Wildlife</h1>

        <div class="video-container" id="videoWrapper">
            <video id="wildlifeVideo" controls aria-label="Wildlife conservation promotional video">
                <source src="wildlife.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <p class="description">
            Our planet's incredible wildlife is facing unprecedented threats. Watch our promotional video to see how our conservation efforts are making a difference, and learn how you can help protect these vital species for generations to come.
        </p>

        <button id="actionBtn" class="control-btn" aria-live="polite">Play Video</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
